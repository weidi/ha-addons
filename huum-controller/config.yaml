name: "Huum Controller"
version: "0.1.1"
slug: "huum_controller"
description: "Local Huum sauna controller with ingress and HTTP API"
url: "https://github.com/weidi/ha-addons/tree/main/huum-controller"
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8080
panel_title: "Huum Controller"
panel_icon: "mdi:sauna"
arch:
  - amd64
  - aarch64
ports:
  6969/tcp: 6969
  8080/tcp: 8080
ports_description:
  6969/tcp: "Huum heater controller TCP port"
  8080/tcp: "Huum controller HTTP API and ingress target"
options:
  update_frequency: 60
schema:
  update_frequency: "int(0,255)"
